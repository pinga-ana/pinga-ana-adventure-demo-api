services:
  - type: web
    name: pinga-ana-adventure-api
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pinga-ana-db
          property: connectionString

databases:
  - name: pinga-ana-db
    databaseName: pinga_ana
    user: pinga_ana
    plan: free
    postgresMajorVersion: "16"
